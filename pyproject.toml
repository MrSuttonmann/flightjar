[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = [".venv", "beast-logs"]

[tool.ruff.lint]
select = [
    "E", "F", "W",   # pycodestyle / pyflakes
    "I",             # isort
    "B",             # flake8-bugbear
    "UP",            # pyupgrade
    "SIM",           # flake8-simplify
    "RUF",           # ruff-specific
]
ignore = [
    "E501",   # line-too-long handled by formatter
    "SIM117", # combined `with` statements are sometimes less readable
    "B008",   # function call in default arg (FastAPI uses this pattern)
]

[tool.ruff.format]
quote-style = "double"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "-q"

[tool.mypy]
python_version = "3.12"
files = ["app"]
check_untyped_defs = true
warn_redundant_casts = true
warn_unused_ignores = true
# Start pragmatic; tighten in a later pass.
disallow_untyped_defs = false
disallow_incomplete_defs = false

[[tool.mypy.overrides]]
module = ["pyModeS.*", "fastapi", "fastapi.*"]
ignore_missing_imports = true
