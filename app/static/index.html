<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Flightjar</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<style>
  :root {
    --bg: #0e1116;
    --panel: #161a22;
    --border: #2a313d;
    --text: #d6dde6;
    --muted: #8a94a3;
    --accent: #5fa8ff;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text);
               font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  #app { display: flex; height: 100vh; }
  #sidebar { width: 320px; background: var(--panel); border-right: 1px solid var(--border);
             display: flex; flex-direction: column; }
  #header { padding: 12px 14px; border-bottom: 1px solid var(--border); }
  #header h1 { margin: 0; font-size: 14px; font-weight: 600; letter-spacing: 0.3px; }
  #status { font-size: 11px; color: var(--muted); margin-top: 4px; }
  #status .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
                 background: #888; margin-right: 6px; vertical-align: middle; }
  #status.live .dot { background: #4ade80; }
  #status.dead .dot { background: #ef4444; }
  #sort-bar { display: flex; gap: 4px; padding: 6px 8px; border-bottom: 1px solid var(--border);
              background: #131821; }
  .sort-chip { flex: 1; padding: 4px 6px; font-size: 11px; text-align: center;
               color: var(--muted); background: transparent; border: 1px solid transparent;
               border-radius: 3px; cursor: pointer; user-select: none;
               font-variant-numeric: tabular-nums; }
  .sort-chip:hover { color: var(--text); }
  .sort-chip.active { color: var(--text); background: #1d2533; border-color: var(--border); }
  .sort-chip .arrow { display: inline-block; width: 8px; color: var(--accent); }
  #ac-list { flex: 1; overflow-y: auto; }
  .ac-item { padding: 8px 14px; border-bottom: 1px solid var(--border); cursor: pointer;
             font-size: 12px; line-height: 1.4; }
  .ac-item:hover { background: #1d222b; }
  .ac-item.selected { background: #1f2a3d; border-left: 3px solid var(--accent);
                      padding-left: 11px; }
  .ac-item .row1 { display: flex; justify-content: space-between; align-items: baseline; }
  .ac-item .cs { font-family: ui-monospace, "SF Mono", Menlo, monospace;
                 font-weight: 600; font-size: 13px; }
  .ac-item .icao { font-family: ui-monospace, monospace; font-size: 10px;
                   color: var(--muted); }
  .ac-item .meta { color: var(--muted); font-size: 11px; margin-top: 2px;
                   font-variant-numeric: tabular-nums; }
  .ac-item .age { float: right; font-size: 10px; color: var(--muted); }
  #map { flex: 1; background: #0a0c10; }
  /* dim the OSM tiles a touch so plane icons pop */
  .leaflet-tile-pane { filter: brightness(0.85) contrast(1.05); }
  .leaflet-popup-content-wrapper, .leaflet-popup-tip {
    background: var(--panel); color: var(--text); border: 1px solid var(--border);
  }
  .leaflet-popup-content { font-size: 12px; line-height: 1.5; margin: 8px 12px; }
  .leaflet-popup-content code { font-size: 11px; color: var(--muted); }
  .plane-icon { background: transparent !important; border: none !important; }
  .receiver-icon { background: transparent !important; border: none !important; }
  .receiver-dot { width: 10px; height: 10px; border-radius: 50%;
                  background: var(--accent); border: 2px solid #0e1116;
                  box-shadow: 0 0 0 1px var(--accent); margin: 1px; }
  .plane-label { background: rgba(14,17,22,0.8); color: #fff; font-size: 10px;
                 padding: 1px 4px; border-radius: 2px; white-space: nowrap;
                 font-family: ui-monospace, monospace;
                 border: 1px solid var(--border); }
  @media (max-width: 600px) {
    #app { flex-direction: column; }
    #sidebar { width: 100%; height: 40vh; border-right: none;
               border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div id="header">
      <h1>Flightjar</h1>
      <div id="status"><span class="dot"></span><span id="status-text">Connecting…</span></div>
    </div>
    <div id="sort-bar">
      <div class="sort-chip" data-key="callsign">Callsign<span class="arrow"></span></div>
      <div class="sort-chip" data-key="altitude">Alt<span class="arrow"></span></div>
      <div class="sort-chip" data-key="distance">Dist<span class="arrow"></span></div>
      <div class="sort-chip" data-key="age">Age<span class="arrow"></span></div>
    </div>
    <div id="ac-list"></div>
  </div>
  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
(() => {
  const map = L.map('map', { worldCopyJump: true }).setView([51.5, -0.1], 6);
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap',
    maxZoom: 19,
  }).addTo(map);

  const aircraft = new Map(); // icao -> { marker, trail, label, data }
  let selectedIcao = null;
  let showLabels = true;
  let firstUpdate = true;
  let lastSnap = null;
  let receiverLayer = null;  // L.LayerGroup containing marker + optional anon circle

  // Sidebar sort state. `dir` is 1 (asc) or -1 (desc).
  // Default direction per key — matches what feels natural for each column.
  const defaultDir = { callsign: 1, altitude: -1, distance: 1, age: 1 };
  let sortKey = 'callsign';
  let sortDir = defaultDir[sortKey];

  function distanceFrom(a, refLat, refLon) {
    if (a.lat == null || a.lon == null || refLat == null || refLon == null) return null;
    // Equirectangular approximation — plenty accurate for sidebar ordering.
    const dLat = (a.lat - refLat) * Math.PI / 180;
    const dLon = (a.lon - refLon) * Math.PI / 180 * Math.cos(refLat * Math.PI / 180);
    return Math.hypot(dLat, dLon) * 6371;  // km
  }

  function sortValue(a, key, snap) {
    switch (key) {
      case 'callsign': return (a.callsign || '').trim() || null;
      case 'altitude': return a.altitude;
      case 'age':      return a.age;
      case 'distance': return distanceFrom(a, snap.receiver?.lat, snap.receiver?.lon);
    }
    return null;
  }

  // Color scale: low altitude = warm, high altitude = cool.
  function altColor(alt) {
    if (alt == null) return '#888';
    const t = Math.max(0, Math.min(1, alt / 40000));
    const hue = 240 * t; // 0=red, 240=blue
    return `hsl(${hue}, 75%, 55%)`;
  }

  function planeIcon(track, color, selected) {
    const rot = track == null ? 0 : track;
    const stroke = selected ? '#fff' : '#000';
    const sw = selected ? 1.5 : 0.6;
    const svg = `
      <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="-13 -13 26 26">
        <path d="M0 -10 L7 8 L0 4 L-7 8 Z"
              transform="rotate(${rot})"
              fill="${color}" stroke="${stroke}" stroke-width="${sw}"
              stroke-linejoin="round"/>
      </svg>`;
    return L.divIcon({
      html: svg,
      className: 'plane-icon',
      iconSize: [26, 26],
      iconAnchor: [13, 13],
    });
  }

  function fmt(n, suffix = '', digits = 0) {
    if (n == null || isNaN(n)) return '—';
    return Number(n).toFixed(digits) + suffix;
  }

  function popupHtml(a) {
    return `
      <b>${a.callsign || '—'}</b> <code>${a.icao.toUpperCase()}</code><br>
      Alt: <b>${fmt(a.altitude, ' ft')}</b><br>
      Spd: ${fmt(a.speed, ' kt')} &nbsp; Hdg: ${fmt(a.track, '°')}<br>
      VRate: ${fmt(a.vrate, ' fpm')}<br>
      Sqwk: ${a.squawk || '—'}<br>
      <code>${a.msg_count} msgs · ${fmt(a.age, 's')} ago</code>`;
  }

  function renderReceiver(rx) {
    if (!rx || rx.lat == null || rx.lon == null) return;
    if (receiverLayer) return;  // draw once; position doesn't change mid-session

    const group = L.layerGroup().addTo(map);
    const label = rx.anon_km > 0
      ? `Receiver area (±${rx.anon_km} km)`
      : 'Receiver';
    const icon = L.divIcon({
      className: 'receiver-icon',
      html: '<div class="receiver-dot"></div>',
      iconSize: [14, 14],
      iconAnchor: [7, 7],
    });
    L.marker([rx.lat, rx.lon], { icon, title: label, interactive: false }).addTo(group);
    if (rx.anon_km > 0) {
      L.circle([rx.lat, rx.lon], {
        radius: rx.anon_km * 1000,
        color: '#5fa8ff', weight: 1, opacity: 0.6,
        fillColor: '#5fa8ff', fillOpacity: 0.08, interactive: false,
      }).addTo(group);
    }
    receiverLayer = group;
  }

  function update(snap) {
    lastSnap = snap;
    renderReceiver(snap.receiver);
    const seen = new Set();

    for (const a of snap.aircraft) {
      seen.add(a.icao);
      if (a.lat == null || a.lon == null) continue;

      const color = altColor(a.altitude);
      const isSelected = a.icao === selectedIcao;
      const icon = planeIcon(a.track, color, isSelected);

      let entry = aircraft.get(a.icao);
      if (!entry) {
        const marker = L.marker([a.lat, a.lon], { icon }).addTo(map);
        const trail = L.polyline([], {
          color, weight: 2, opacity: 0.55,
        }).addTo(map);
        marker.on('click', () => selectAircraft(a.icao));
        entry = { marker, trail, label: null, data: a };
        aircraft.set(a.icao, entry);
      } else {
        entry.marker.setLatLng([a.lat, a.lon]);
        entry.marker.setIcon(icon);
        entry.trail.setStyle({ color });
      }

      if (a.trail && a.trail.length > 1) {
        entry.trail.setLatLngs(a.trail);
      }
      entry.marker.setPopupContent(popupHtml(a));
      if (!entry.marker.getPopup()) entry.marker.bindPopup(popupHtml(a));

      // Persistent label with callsign
      const labelText = a.callsign || a.icao.toUpperCase();
      if (showLabels) {
        if (!entry.label) {
          entry.marker.bindTooltip(labelText, {
            permanent: true, direction: 'right', offset: [10, 0],
            className: 'plane-label',
          });
          entry.label = true;
        } else {
          entry.marker.setTooltipContent(labelText);
        }
      }
      entry.data = a;
    }

    // Drop aircraft no longer reported
    for (const [icao, entry] of aircraft.entries()) {
      if (!seen.has(icao)) {
        map.removeLayer(entry.marker);
        map.removeLayer(entry.trail);
        aircraft.delete(icao);
      }
    }

    renderSidebar(snap);

    // Auto-fit on first populated update
    if (firstUpdate && snap.positioned > 0) {
      const bounds = L.latLngBounds(
        snap.aircraft.filter(a => a.lat != null).map(a => [a.lat, a.lon])
      );
      if (bounds.isValid()) map.fitBounds(bounds.pad(0.2), { maxZoom: 7 });
      firstUpdate = false;
    }
  }

  function renderSortBar() {
    document.querySelectorAll('.sort-chip').forEach(el => {
      const active = el.dataset.key === sortKey;
      el.classList.toggle('active', active);
      el.querySelector('.arrow').textContent = active ? (sortDir === 1 ? '↑' : '↓') : '';
    });
  }

  function renderSidebar(snap) {
    const status = document.getElementById('status-text');
    status.textContent =
      `${snap.count} aircraft · ${snap.positioned} positioned`;
    document.title = `Flightjar (${snap.count})`;

    // Sort a copy so we don't mutate the snapshot used elsewhere.
    const rows = snap.aircraft.slice().sort((a, b) => {
      const av = sortValue(a, sortKey, snap);
      const bv = sortValue(b, sortKey, snap);
      // Null always sinks to the bottom regardless of direction.
      if (av == null && bv == null) return a.icao.localeCompare(b.icao);
      if (av == null) return 1;
      if (bv == null) return -1;
      const cmp = typeof av === 'string' ? av.localeCompare(bv) : av - bv;
      return cmp * sortDir || a.icao.localeCompare(b.icao);
    });

    const list = document.getElementById('ac-list');
    list.innerHTML = rows.map(a => `
      <div class="ac-item ${a.icao === selectedIcao ? 'selected' : ''}"
           data-icao="${a.icao}">
        <div class="row1">
          <span class="cs">${a.callsign || '— — — —'}</span>
          <span class="icao">${a.icao.toUpperCase()}</span>
        </div>
        <div class="meta">
          ${fmt(a.altitude, ' ft')} ·
          ${fmt(a.speed, ' kt')} ·
          ${fmt(a.track, '°')}
          <span class="age">${fmt(a.age, 's')}</span>
        </div>
      </div>
    `).join('');

    list.querySelectorAll('.ac-item').forEach(el => {
      el.addEventListener('click', () => selectAircraft(el.dataset.icao));
    });
  }

  function selectAircraft(icao) {
    selectedIcao = icao;
    const entry = aircraft.get(icao);
    if (entry) {
      map.panTo(entry.marker.getLatLng());
      entry.marker.openPopup();
      // Refresh icon stroke
      const a = entry.data;
      entry.marker.setIcon(planeIcon(a.track, altColor(a.altitude), true));
    }
    document.querySelectorAll('.ac-item').forEach(el => {
      el.classList.toggle('selected', el.dataset.icao === icao);
    });
  }

  document.querySelectorAll('.sort-chip').forEach(el => {
    el.addEventListener('click', () => {
      const key = el.dataset.key;
      if (key === sortKey) {
        sortDir = -sortDir;
      } else {
        sortKey = key;
        sortDir = defaultDir[key];
      }
      renderSortBar();
      if (lastSnap) renderSidebar(lastSnap);
    });
  });
  renderSortBar();

  // ---- WebSocket ----
  let ws;
  let reconnectTimer = null;
  function setStatus(state, text) {
    const s = document.getElementById('status');
    s.classList.remove('live', 'dead');
    if (state) s.classList.add(state);
    if (text) document.getElementById('status-text').textContent = text;
  }
  function connect() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${proto}//${location.host}/ws`);
    ws.onopen = () => setStatus('live', 'Connected');
    ws.onmessage = (ev) => {
      try { update(JSON.parse(ev.data)); }
      catch (e) { console.error('bad snapshot', e); }
    };
    ws.onclose = () => {
      setStatus('dead', 'Disconnected, retrying…');
      clearTimeout(reconnectTimer);
      reconnectTimer = setTimeout(connect, 2000);
    };
    ws.onerror = () => ws.close();
  }
  connect();
})();
</script>
</body>
</html>
