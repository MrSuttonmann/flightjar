<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Flightjar</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- OpenStreetMap's tile servers block requests with no Referer header. -->
<meta name="referrer" content="strict-origin-when-cross-origin">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<link rel="stylesheet" href="/static/app.css?v=__CSS_V__">
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div id="header">
      <h1>Flightjar<span id="site-name"></span></h1>
      <div id="header-row2">
        <div id="status"><span class="dot"></span><span id="status-text">Connecting…</span><span id="heartbeat"></span></div>
        <div id="view-controls">
          <button id="labels-toggle" class="unit-btn" title="Toggle aircraft labels">Labels</button>
          <button id="trails-toggle" class="unit-btn" title="Toggle altitude-coloured trails">Trails</button>
          <div id="unit-switch" title="Units">
            <button class="unit-btn" data-unit="metric">Metric</button>
            <button class="unit-btn" data-unit="imperial">Imperial</button>
            <button class="unit-btn" data-unit="nautical">Nautical</button>
          </div>
        </div>
      </div>
    </div>
    <div id="search-bar">
      <input id="search" type="search" autocomplete="off"
             placeholder="Search callsign or ICAO (/)">
    </div>
    <div id="sort-bar">
      <div class="sort-chip" data-key="callsign">Callsign<span class="arrow"></span></div>
      <div class="sort-chip" data-key="altitude">Alt<span class="arrow"></span></div>
      <div class="sort-chip" data-key="distance">Dist<span class="arrow"></span></div>
      <div class="sort-chip" data-key="age">Age<span class="arrow"></span></div>
    </div>
    <div id="ac-list"></div>
  </div>
  <div id="map"></div>
  <div id="sidebar-footer">
    <a href="https://github.com/MrSuttonmann/flightjar" target="_blank" rel="noopener"
       title="Flightjar on GitHub">
      <svg viewBox="0 0 16 16" aria-hidden="true">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
      </svg>
      GitHub
    </a>
    <a href="https://www.buymeacoffee.com/mrsuttonmann" target="_blank" rel="noopener"
       title="Buy me a coffee">
      <img src="https://cdn.buymeacoffee.com/buttons/v2/default-yellow.png" alt="Buy Me A Coffee">
    </a>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="/static/app.js?v=__JS_V__"></script>
</body>
</html>
