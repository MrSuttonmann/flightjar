name: CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:
    inputs:
      tag:
        description: "Extra tag alongside :latest (e.g. v1.2.0). Leave blank for just :latest."
        required: false
        default: ""

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        run: mypy

      - name: Pytest
        run: pytest

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Node tests (frontend modules)
        run: node --test tests/js/

  publish:
    # Only build + push the Docker image when:
    #   - pushing to main (continuous deployment of :latest + git-<sha>),
    #   - pushing a v* tag (pinned release like v1.2.3),
    #   - or manually triggered (workflow_dispatch, with an optional extra tag).
    # Pull-request builds stop at `check` — they never touch Docker Hub.
    needs: check
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
        (github.ref == 'refs/heads/main' ||
         startsWith(github.ref, 'refs/tags/v')))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/flightjar
          tags: |
            type=raw,value=latest
            type=sha,format=short,prefix=git-
            type=semver,pattern={{version}}
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # DATA_CACHEBUST is a per-commit string that's referenced in
          # the Dockerfile just above the data-fetch RUN layers, so those
          # never serve cached (potentially months-old) aircraft /
          # airport / tar1090-marker data. Everything else (pip install,
          # app code copy) still caches normally between builds.
          # FLIGHTJAR_VERSION stamps the image with the commit that
          # produced it; /api/stats exposes it and the About dialog
          # shows the short form next to the title.
          build-args: |
            DATA_CACHEBUST=${{ github.sha }}
            FLIGHTJAR_VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
