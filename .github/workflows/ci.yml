name: CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:
    inputs:
      tag:
        description: "Extra tag alongside :latest (e.g. v1.2.0). Leave blank for just :latest."
        required: false
        default: ""

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        run: mypy

      - name: Pytest
        run: pytest

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Node tests (frontend modules)
        run: node --test tests/js/

  e2e:
    # Playwright smoke suite against the real FastAPI backend in its
    # no-BEAST harness mode (see playwright.config.js webServer env).
    # Runs in parallel with `check`; `publish` gates on this one too
    # so a broken UI also blocks the image push.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      # Cache the Playwright browser binaries across runs. npm install
      # doesn't need its own cache since we deliberately don't commit a
      # lockfile (single dep, resolves fast; no cross-CI reproducibility
      # concern). The cache key includes the @playwright/test version
      # pinned in package.json so a bump invalidates cleanly.
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package.json') }}

      - name: Install Playwright + Chromium
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Stage auto-generated assets
        # Neither the aircraft CSV nor the tar1090 silhouettes are
        # committed; fetch them so the app serves a complete page.
        # TAR1090_SHAPES_DEST overrides the script's default (/app/...)
        # to land inside the checked-out repo rather than the Docker
        # image path.
        env:
          TAR1090_SHAPES_DEST: ${{ github.workspace }}/app/static/tar1090_shapes.js
        run: |
          python scripts/fetch_plane_shapes.py
          curl -sSL -o app/aircraft_db.csv.gz \
            https://raw.githubusercontent.com/wiedehopf/tar1090-db/refs/heads/csv/aircraft.csv.gz
          curl -sSL -o app/airports.csv \
            https://raw.githubusercontent.com/davidmegginson/ourairports-data/main/airports.csv
          curl -sSL -o app/airlines.dat \
            https://raw.githubusercontent.com/jpatokal/openflights/master/data/airlines.dat

      - name: Playwright tests
        run: npm run test:e2e

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  publish:
    # Only build + push the Docker image when:
    #   - pushing to main (continuous deployment of :latest + git-<sha>),
    #   - pushing a v* tag (pinned release like v1.2.3),
    #   - or manually triggered (workflow_dispatch, with an optional extra tag).
    # Pull-request builds stop at check + e2e — they never touch Docker Hub.
    needs: [check, e2e]
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
        (github.ref == 'refs/heads/main' ||
         startsWith(github.ref, 'refs/tags/v')))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/flightjar
          tags: |
            type=raw,value=latest
            type=sha,format=short,prefix=git-
            type=semver,pattern={{version}}
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # DATA_CACHEBUST is a per-commit string that's referenced in
          # the Dockerfile just above the data-fetch RUN layers, so those
          # never serve cached (potentially months-old) aircraft /
          # airport / tar1090-marker data. Everything else (pip install,
          # app code copy) still caches normally between builds.
          # FLIGHTJAR_VERSION stamps the image with the commit that
          # produced it; /api/stats exposes it and the About dialog
          # shows the short form next to the title.
          build-args: |
            DATA_CACHEBUST=${{ github.sha }}
            FLIGHTJAR_VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
