name = "flightjar-relay"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Workers Logs — captures console.log + uncaught exceptions in the
# Cloudflare dashboard (Logs tab) and via `wrangler tail`. Free-tier
# included; default head sampling is 100%.
[observability]
enabled = true

[durable_objects]
bindings = [{ name = "RELAY", class_name = "RelayDurableObject" }]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RelayDurableObject"]

# Per-IP rate limit on /register so the open registration endpoint can't
# be used to mint tokens unbounded from any one source. 5 requests per
# minute is generous for legitimate retries; misbehaving callers get 429
# until they back off.
[[ratelimits]]
name = "REGISTER_RATE_LIMIT"
namespace_id = "1001"
simple = { limit = 5, period = 60 }
