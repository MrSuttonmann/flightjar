name = "flightjar-relay"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Workers Logs — captures console.log + uncaught exceptions + per-request
# trace events (timing, status, CPU time) in the Cloudflare dashboard
# (Logs tab) and via `wrangler tail`. head_sampling_rate=1 means every
# request is captured; on the paid plan this is included up to a generous
# daily quota.
[observability]
enabled = true
head_sampling_rate = 1

[durable_objects]
bindings = [{ name = "RELAY", class_name = "RelayDurableObject" }]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RelayDurableObject"]

# Per-IP rate limit on /register so the open registration endpoint can't
# be used to mint tokens unbounded from any one source. 5 requests per
# minute is generous for legitimate retries; misbehaving callers get 429
# until they back off.
[[ratelimits]]
name = "REGISTER_RATE_LIMIT"
namespace_id = "1001"
simple = { limit = 5, period = 60 }
